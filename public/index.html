<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPDV - Login</title>
  <link rel="shortcut icon" href="" id="dynamicFavicon">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>CyberPDV</h1>
        <p>Sistema de Vendas</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="Digite seu usuário" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>
      <div id="loginError" class="error-msg"></div>
      <div class="login-footer">
        <p>Usuários padrão: lord / adm / gerente / vendedor</p>
        <p>Senha: usuario123 (lord=lord123, adm=adm123, gerente=gerente123, vendedor=vendedor123)</p>
      </div>
    </div>
  </div>
  <script src="/js/i18n.js"></script>
  <script src="/js/ai-chat.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
