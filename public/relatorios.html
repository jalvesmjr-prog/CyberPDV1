<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPDV - Relatórios</title>
  <link rel="shortcut icon" href="" id="dynamicFavicon">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .reports-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .report-card { background:white; border-radius:8px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .report-card h3 { margin-bottom:12px; color:#1a1a2e; font-size:14px; text-transform:uppercase; }
    .report-card.full { grid-column: 1 / -1; }
    .stat-big { font-size:28px; font-weight:700; color:#27ae60; }
    .stat-label { font-size:12px; color:#999; }
    .stats-row { display:flex; gap:24px; flex-wrap:wrap; }
    .stat-item { text-align:center; min-width:100px; }
    .table-mini { width:100%; font-size:13px; border-collapse:collapse; }
    .table-mini th { background:#1a1a2e; color:white; padding:6px 8px; font-size:11px; text-align:left; }
    .table-mini td { padding:5px 8px; border-bottom:1px solid #eee; }
    .table-mini tr:hover { background:#f8f9fa; }
    .bar-container { display:flex; align-items:center; gap:8px; margin:3px 0; }
    .bar-fill { height:20px; background:#27ae60; border-radius:3px; min-width:2px; transition:width 0.3s; }
    .period-nav { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .period-nav button.active { background:#0f3460; color:white; }
    @media (max-width:768px) { .reports-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-left">
      <strong>CyberPDV</strong> - Relatórios
    </div>
    <div class="topbar-right">
      <span id="userDisplay"></span>
      <button class="btn btn-sm" onclick="location.href='/vendas.html'">Vendas</button>
      <button class="btn btn-sm" onclick="location.href='/produtos.html'">Produtos</button>
      <button class="btn btn-sm" onclick="location.href='/historico.html'">Histórico</button>
      <button class="btn btn-sm" onclick="location.href='/config.html'">Config</button>
      <button class="btn btn-sm btn-danger" onclick="logout()">Sair</button>
    </div>
  </nav>

  <div class="container">
    <div class="toolbar" style="flex-wrap:wrap;">
      <label style="font-size:13px;font-weight:600;">Período:</label>
      <input type="date" id="reportStart" onchange="carregarRelatorios()" style="width:auto;padding:7px 10px;border:2px solid #ddd;border-radius:5px;">
      <span style="color:#999;">até</span>
      <input type="date" id="reportEnd" onchange="carregarRelatorios()" style="width:auto;padding:7px 10px;border:2px solid #ddd;border-radius:5px;">
      <div class="period-nav">
        <button class="btn btn-sm btn-secondary" onclick="setPeriod('today', event)">Hoje</button>
        <button class="btn btn-sm btn-secondary" onclick="setPeriod('week', event)">Esta Semana</button>
        <button class="btn btn-sm btn-secondary" onclick="setPeriod('month', event)">Este Mês</button>
        <button class="btn btn-sm btn-secondary" onclick="setPeriod('all', event)">Todo Período</button>
      </div>
    </div>

    <div class="reports-grid">
      <div class="report-card">
        <h3>Resumo</h3>
        <div class="stats-row" id="summaryStats">
          <div class="stat-item"><div class="stat-big" id="statSales">-</div><div class="stat-label">Vendas</div></div>
          <div class="stat-item"><div class="stat-big" id="statRevenue">-</div><div class="stat-label">Receita</div></div>
          <div class="stat-item"><div class="stat-big" id="statAvg">-</div><div class="stat-label">Ticket Médio</div></div>
        </div>
      </div>

      <div class="report-card">
        <h3>Formas de Pagamento</h3>
        <div id="paymentStats"></div>
      </div>

      <div class="report-card full">
        <h3>Vendas por Período</h3>
        <div id="periodStats"></div>
      </div>

      <div class="report-card full">
        <h3>Vendas por Vendedor</h3>
        <div id="userStats"></div>
      </div>

      <div class="report-card full" style="border:2px solid #0f3460;">
        <h3>🧠 IA Analytics</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <button class="btn btn-sm btn-primary" onclick="carregarIAForecast()">📈 Previsão</button>
          <button class="btn btn-sm btn-primary" onclick="carregarIAReorder()">📦 Reabastecimento</button>
          <button class="btn btn-sm btn-primary" onclick="carregarIAAnomalies()">⚠️ Anomalias</button>
          <button class="btn btn-sm btn-primary" onclick="carregarIAInsights()">💡 Insights</button>
          <button class="btn btn-sm btn-primary" onclick="carregarIAassociations()">🔄 Associações</button>
          <button class="btn btn-sm btn-primary" onclick="carregarIAPricing()">🏷️ Preços</button>
        </div>
        <div id="iaAnalyticsContent" style="font-size:13px;min-height:60px;">
          <p style="color:#999;">Clique em um botão acima para gerar análises de IA.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/ai-chat.js"></script>
  <script src="/js/ai-assistant.js"></script>
  <script src="/js/relatorios.js"></script>
</body>
</html>
